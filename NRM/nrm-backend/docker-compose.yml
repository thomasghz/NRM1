version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nrm_user
      POSTGRES_PASSWORD: nrm_pass
      POSTGRES_DB: nrm_db
    ports:
      - "5432:5432"
    volumes:
      - nrm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrm_user -d nrm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://nrm_user:nrm_pass@db:5432/nrm_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  nrm_pgdata:
